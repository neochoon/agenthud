name: Test

on:
  workflow_call:
    inputs:
      upload-coverage:
        description: Upload coverage to Codecov (only from CI runs)
        type: boolean
        default: false
    secrets:
      codecov-token:
        required: false

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --coverage

      - name: Upload coverage reports to Codecov
        if: inputs.upload-coverage && matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.codecov-token }}
